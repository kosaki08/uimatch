<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Composite Figma smoke defect fixture</title>
    <link rel="stylesheet" href="/smoke.css" />
    <script src="/font-ready.js" defer></script>
  </head>
  <body>
    <main id="composite" class="composite-gap-defect">
      <h1>Metrics</h1>
      <div class="smoke-table">
        <div class="smoke-row">
          <div class="smoke-cell">Primary metric</div>
          <div class="smoke-cell">Secondary metric</div>
        </div>
        <div class="smoke-row">
          <div class="smoke-cell">No data</div>
          <div class="smoke-cell">Above range</div>
        </div>
        <div class="smoke-row">
          <div class="smoke-cell">Nominal</div>
          <div class="smoke-cell">In range</div>
        </div>
        <div class="smoke-row">
          <div class="smoke-cell">No data</div>
          <div class="smoke-cell">Above range</div>
        </div>
      </div>
    </main>
  </body>
</html>
