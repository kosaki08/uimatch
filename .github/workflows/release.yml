name: release

on:
  push:
    branches: [main]
  # Lets a release be retried from an unchanged main, for example after
  # ENABLE_PUBLISH is turned on or a registry outage.
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    env:
      # Only whether publishing is possible, so the token itself stays out of
      # every step that does not need it. ENABLE_PUBLISH is a repository variable.
      PUBLISHING: ${{ secrets.NPM_TOKEN != '' && vars.ENABLE_PUBLISH == 'true' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.23.1'
          registry-url: 'https://registry.npmjs.org'
          cache: 'pnpm'

      - name: Install dependencies (no scripts)
        run: HUSKY=0 pnpm install --frozen-lockfile --ignore-scripts

      - name: Bootstrap workspace (pre-build local packages)
        run: pnpm run bootstrap

      - name: Build packages (solution, ordered)
        run: pnpm run build:force

      - name: Check
        run: pnpm run check

      # This job is what stands between a merged version pull request and npm,
      # so it re-runs the suites rather than trusting an earlier ci run.
      - name: Install Playwright browsers
        if: ${{ env.PUBLISHING == 'true' }}
        run: pnpm exec playwright install --with-deps chromium

      - name: Test
        if: ${{ env.PUBLISHING == 'true' }}
        run: pnpm test

      - name: Verify the distribution
        if: ${{ env.PUBLISHING == 'true' }}
        run: pnpm run release:verify

      - name: Create release pull request or publish to npm
        id: changesets
        if: ${{ env.PUBLISHING == 'true' }}
        uses: changesets/action@v1
        with:
          # Wraps `changeset version` so a 0.x peer bump cannot force a major
          # release; see scripts/release/version-packages.mjs.
          version: pnpm run version:packages
          # `changeset publish` publishes only the versions that are missing
          # from the registry and tags each one. The npm credentials are checked
          # inside it so a registry problem cannot stop the version pull request
          # from being opened, which is how changesets stopped being consumed.
          publish: pnpm run release:publish
          title: 'chore: version packages'
          commit: 'chore: version packages'
        env:
          GITHUB_TOKEN: ${{ github.token }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          # pnpm reads this as its `provenance` config. It requires each
          # manifest to declare a repository that matches this one; confirm the
          # provenance badge on npm after the first release.
          NPM_CONFIG_PROVENANCE: true
